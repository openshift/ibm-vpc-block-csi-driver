kind: Deployment
apiVersion: apps/v1
metadata:
  name: ibm-vpc-block-csi-controller
  namespace: kube-system
  labels:
    app: ibm-vpc-block-csi-controller
    addonmanager.kubernetes.io/mode: Reconcile
    app.kubernetes.io/name: ibm-vpc-block-csi-driver
spec:
  replicas: 1
  selector:
    matchLabels:
      app: ibm-vpc-block-csi-controller
      app.kubernetes.io/name: ibm-vpc-block-csi-driver
  template:
    metadata:
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "9080"
        prometheus.io/path: "/metrics"
      labels:
        app: ibm-vpc-block-csi-controller
        app.kubernetes.io/name: ibm-vpc-block-csi-driver
    spec:
      priorityClassName: system-cluster-critical
      serviceAccountName: ibm-vpc-block-controller-sa
      securityContext:
        runAsNonRoot: true
        runAsUser: 2121
        runAsGroup: 2121
      containers:
        - name: csi-snapshotter
          image: MUSTPATCHWITHKUSTOMIZE
          imagePullPolicy: Always
          securityContext:
            privileged: false
            allowPrivilegeEscalation: false
          args:
            - "--v=5"
            - "--csi-address=/csi/csi.sock"
            - "--timeout=900s"
            - "--leader-election=false"
          resources:
            limits:
              cpu: 80m
              memory: 160Mi
            requests:
              cpu: 20m
              memory: 40Mi
          volumeMounts:
            - name: socket-dir
              mountPath: /csi
        - name: csi-provisioner
          image: MUSTPATCHWITHKUSTOMIZE
          imagePullPolicy: Always
          securityContext:
            privileged: false
            allowPrivilegeEscalation: false
          args:
            - "--v=5"
            - "--csi-address=$(ADDRESS)"
            - "--timeout=600s"
            - "--feature-gates=Topology=true"
          env:
            - name: ADDRESS
              value: /csi/csi.sock
          resources:
            limits:
              cpu: 80m
              memory: 160Mi
            requests:
              cpu: 20m
              memory: 40Mi
          volumeMounts:
            - name: socket-dir
              mountPath: /csi
        - name: csi-resizer
          image: MUSTPATCHWITHKUSTOMIZE
          imagePullPolicy: Always
          securityContext:
            privileged: false
            allowPrivilegeEscalation: false
          args:
            - "--v=5"
            - "--csi-address=$(ADDRESS)"
            - "--timeout=600s"
            - "--handle-volume-inuse-error=false"
          env:
            - name: ADDRESS
              value: /csi/csi.sock
          resources:
            limits:
              cpu: 80m
              memory: 160Mi
            requests:
              cpu: 20m
              memory: 40Mi
          volumeMounts:
            - name: socket-dir
              mountPath: /csi
        - name: csi-attacher
          image: MUSTPATCHWITHKUSTOMIZE
          securityContext:
            privileged: false
            allowPrivilegeEscalation: false
          args:
            - "--v=5"
            - "--csi-address=/csi/csi.sock"
            - "--timeout=900s"
            - "--worker-threads=15"
            - "--kube-api-qps=5"
            - "--kube-api-burst=10"
          resources:
            limits:
              cpu: 60m
              memory: 120Mi
            requests:
              cpu: 15m
              memory: 30Mi
          volumeMounts:
            - name: socket-dir
              mountPath: /csi
        - name: iks-vpc-block-driver
          image: MUSTPATCHWITHKUSTOMIZE
          imagePullPolicy: Always
          securityContext:
            privileged: false
            allowPrivilegeEscalation: false
          args:
            - "--v=5"
            - "--endpoint=$(CSI_ENDPOINT)"
            - "--lock_enabled=false"
            - "--sidecarEndpoint=$(SIDECAREP)"
          envFrom:
          - configMapRef:
              name: ibm-vpc-block-csi-configmap
          env:
            - name: POD_NAME
              valueFrom:
                fieldRef:
                  fieldPath: metadata.name
            - name: POD_NAMESPACE
              valueFrom:
                fieldRef:
                  fieldPath: metadata.namespace
            - name: KUBE_NODE_NAME
              valueFrom:
                fieldRef:
                  fieldPath: spec.nodeName
            - name: MAX_VPC_RETRY_ATTEMPT
              value: "46"
            - name: MIN_VPC_RETRY_INTERVAL
              value: "3"
            - name: MIN_VPC_RETRY_INTERVAL_ATTEMPT
              value: "3"
          resources:
            limits:
              cpu: 300m
              memory: 600Mi
            requests:
              cpu: "75m"
              memory: "150Mi"
          ports:
            - name: healthz
              containerPort: 9808
              protocol: TCP
          livenessProbe:
            httpGet:
              path: /healthz
              port: healthz
            initialDelaySeconds: 10
            timeoutSeconds: 3
            periodSeconds: 10
            failureThreshold: 5
          volumeMounts:
            - name: socket-dir
              mountPath: /csi
            - name: customer-auth
              readOnly: true
              mountPath: /etc/storage_ibmc
            - mountPath: /var/run/secrets/tokens
              name: vault-token
        - name: liveness-probe
          image: MUSTPATCHWITHKUSTOMIZE
          securityContext:
            privileged: false
            allowPrivilegeEscalation: false
          args:
            - --csi-address=/csi/csi.sock
          resources:
            limits:
              cpu: 20m
              memory: 40Mi
            requests:
              cpu: 5m
              memory: 10Mi
          volumeMounts:
            - name: socket-dir
              mountPath: /csi
      volumes:
        - name: vault-token
          projected:
            sources:
            - serviceAccountToken:
                path: vault-token
                expirationSeconds: 600
        - name: socket-dir
          emptyDir: {}
        - name: customer-auth
          secret:
            secretName: storage-secret-store
            